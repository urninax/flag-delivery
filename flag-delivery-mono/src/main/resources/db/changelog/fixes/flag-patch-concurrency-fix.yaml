databaseChangeLog:
  - changeSet:
      id: 2026-02-25-fix-flag-patch-concurrency
      author: urninax
      changes:
        - addColumn:
            tableName: flag_variation
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: '0'
                  constraints:
                    nullable: false

        - addColumn:
            tableName: rule
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: '0'
                  constraints:
                    nullable: false

        - addColumn:
            tableName: rule_clause
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: '0'
                  constraints:
                    nullable: false