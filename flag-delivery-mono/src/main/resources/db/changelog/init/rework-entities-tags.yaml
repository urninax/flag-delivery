databaseChangeLog:
  - changeSet:
      id: 2026-02-25-rework-environment-tags
      author: urninax
      dbms: postgresql
      changes:
        - addColumn:
            tableName: environment
            columns:
              - column:
                  name: tags
                  type: jsonb
                  defaultValue: '[]'

        - sql:
            sql: "
              update environment e 
              set tags = subquery.tags_array 
              from (
                select environment_id, jsonb_agg(id_tag) as tags_array
                from (
                  select environment_id, tag as id_tag
                  from environment_tags
                ) inner_tags
                group by environment_id
              ) as subquery 
              where e.id = subquery.environment_id;"

        - sql:
            sql: "create index idx_environment_tags on environment using gin (tags);"

        - dropForeignKeyConstraint:
            baseTableName: environment_tags
            constraintName: fk_env_tags_environment

        - dropTable:
            tableName: environment_tags

      rollback:
        - createTable:
            tableName: environment_tags
            columns:
              - column: { name: environment_id, type: UUID, constraints: { nullable: false } }
              - column: { name: tag, type: VARCHAR(64), constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: environment_tags
            columnNames: environment_id, tag
            constraintName: pk_environment_tags
        - addForeignKeyConstraint:
            baseTableName: environment_tags
            baseColumnNames: environment_id
            referencedTableName: environment
            referencedColumnNames: id
            constraintName: fk_env_tags_environment
        - sql:
            sql: "INSERT INTO environment_tags (environment_id, tag) SELECT id, jsonb_array_elements_text(tags) FROM environment WHERE tags IS NOT NULL AND tags != '[]'::jsonb;"
        - dropIndex:
            indexName: idx_environment_tags
            tableName: environment
        - dropColumn:
            tableName: environment
            columnName: tags

